<div class="seller-auth">
    <div *ngIf="!showLogin" class="sign-up">
        <h1>Seller sign-up</h1>
        <form #sellerSignUp="ngForm" (ngSubmit)="signUp(sellerSignUp.value)" class="common-form" >
            <input class="form-input" ngModel type="text" placeholder="Enter UserName" name="name">
            <input type="password" ngModel class="form-input" placeholder="Enter password" name="password">
            <input type="text" ngModel class="form-input" placeholder="Enter Email" name="Email">
            <button type="submit" routerLink="/seller-auth" class="form-button">Sign Up</button>
             <a class="auth-toggle-link" (click)="openLogin()">Already have account? Click for Login</a>
        </form>
    </div>

    <div *ngIf="showLogin" class="login">
        <h1>Seller Login</h1>
        <p class="error-p" >{{authError}}</p>
        <form #sellerLogin="ngForm" (ngSubmit)="login(sellerLogin.value)" class="common-form" >
            <!-- <input class="form-input" ngModel type="text" placeholder="Enter UserName" name="name"> -->
            <input type="text" ngModel class="form-input" placeholder="Enter Email" name="Email">
            <input type="password" ngModel class="form-input" placeholder="Enter password" name="password">
            <!-- <button type="submit" routerLink="/login" class="form-button">Login</button> -->
            <button type="submit" class="form-button">Login</button>
            <a class="auth-toggle-link" (click)="openSignUp()">Don't have account? Click for Sign-Up</a>
        </form>
    </div>
</div>
