<div class="chat-widget-wrapper">
  <!-- Floating Action Button -->
  <div class="chat-label" *ngIf="!isChatOpen && !isLabelDismissed" (click)="toggleChat()">
    <div class="chat-label-avatar">🤖</div>
    <div class="chat-label-text">
      <strong>AI Assistant</strong>
      <span>Need help finding a watch?</span>
    </div>
    <button class="chat-label-close" (click)="dismissLabel($event)">×</button>
  </div>
  <button class="chat-fab" (click)="toggleChat()" [ngClass]="{'open': isChatOpen}">
    <svg *ngIf="!isChatOpen" width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M21 15C21 15.5304 20.7893 16.0391 20.4142 16.4142C20.0391 16.7893 19.5304 17 19 17H7L3 21V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H19C19.5304 3 20.0391 3.21071 20.4142 3.58579C20.7893 3.96086 21 4.46957 21 5V15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg *ngIf="isChatOpen" width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <!-- Chat Window -->
  <div class="chat-container" [class.show]="isChatOpen">
    <div class="chat-header">
      <div class="chat-title">
        <span class="logo-accent">AI</span> Assistant
      </div>
      <button class="close-btn" (click)="toggleChat()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="chat-messages">
      <div class="chat-suggestions" *ngIf="messages.length === 0">
        <button class="suggestion-chip" *ngFor="let suggestion of suggestions" (click)="useSuggestion(suggestion)">
          {{suggestion}}
        </button>
      </div>
      <div *ngFor="let msg of messages" class="message-wrapper" [ngClass]="{'user-msg-wrapper': msg.sender === 'user', 'ai-msg-wrapper': msg.sender === 'ai'}">
        <div class="message-bubble" [ngClass]="{'user-bubble': msg.sender === 'user', 'ai-bubble': msg.sender === 'ai'}">
          <div class="msg-sender" *ngIf="msg.sender === 'ai'">AI</div>
          <div class="msg-text">{{msg.text}}</div>
          <div class="msg-actions" *ngIf="msg.sender === 'ai'">
            <button class="msg-speak-btn" (click)="speak(msg.text)" title="Read Aloud">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M11 5L6 9H2V15H6L11 19V5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M15.54 8.46002C16.4774 9.39766 17.004 10.6692 17.004 11.995C17.004 13.3208 16.4774 14.5924 15.54 15.53" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M19.07 4.93005C20.9447 6.80528 21.9979 9.34836 21.9979 12.0001C21.9979 14.6517 20.9447 17.1948 19.07 19.0701" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button class="show-products-btn" *ngIf="msg.isDone && msg.searchQuery" (click)="showProducts(msg.searchQuery)">
              Show Product List
            </button>
          </div>
        </div>
      </div>
      <div *ngIf="isTyping">
        AI is typing...
      </div>
    </div>

    <div class="chat-input-area">
      <button class="chat-mic-btn" [class.listening]="isListening" (click)="startListening()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C10.3431 2 9 3.34315 9 5V11C9 12.6569 10.3431 14 12 14C13.6569 14 15 12.6569 15 11V5C15 3.34315 13.6569 2 12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M19 10V11C19 14.866 15.866 18 12 18C8.13401 18 5 14.866 5 11V10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 18V22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <input
        type="text"
        class="chat-input"
        [(ngModel)]="userMessage"
        placeholder="Ask anything..."
        (keyup.enter)="send()"
      >
      <button class="chat-send-btn" (click)="send()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>
